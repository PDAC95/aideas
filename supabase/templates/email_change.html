<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your new AIDEAS email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #111; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #111;">
    <tr>
      <td align="center" style="padding: 40px 16px;">
        <table width="560" cellpadding="0" cellspacing="0" border="0" style="max-width: 560px; width: 100%;">

          <!-- Logo -->
          <tr>
            <td style="padding-bottom: 32px;">
              <img src="https://app.aideas.com/logo.png" alt="AIDEAS" height="32" style="display: block;">
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td style="padding-bottom: 16px;">
              <h1 style="margin: 0; font-size: 24px; font-weight: 600; color: #fff; line-height: 1.3;">Confirm your new email</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding-bottom: 32px;">
              <p style="margin: 0; font-size: 16px; line-height: 1.6; color: #e0e0e0;">You requested to change your email address. Click the button below to confirm your new email.</p>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td style="padding-bottom: 32px;">
              <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: #fff; color: #111; font-size: 15px; font-weight: 600; text-decoration: none; padding: 12px 24px; border-radius: 6px;">Confirm new email</a>
            </td>
          </tr>

          <!-- Ignore notice -->
          <tr>
            <td style="padding-bottom: 32px;">
              <p style="margin: 0; font-size: 14px; line-height: 1.6; color: #5f5f5f;">If you didn't request this change, please contact support immediately.</p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="border-top: 1px solid #222; padding-top: 24px;">
              <p style="margin: 0 0 4px; font-size: 12px; color: #5f5f5f;">AIDEAS — AI Automation as a Service</p>
              <p style="margin: 0; font-size: 12px; color: #5f5f5f;">This email was sent to {{ .Email }}</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
